services:
  splunk:
    image: splunk/splunk:latest
    platform: linux/amd64
    container_name: splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=MacSplunkPass123
      - SPLUNK_HEC_TOKEN=11111111-1111-1111-1111-111111111111
    ports:
      - "8000:8000"
      - "8088:8088"
      - "8089:8089"
      - "9997:9997"
    volumes:
      - splunk_etc:/opt/splunk/etc
      - splunk_var:/opt/splunk/var

  cribl:
    image: cribl/cribl:latest
    container_name: cribl
    environment:
      - CRIBL_DIST_MODE=single
      - CRIBL_VOLUME_DIR=/opt/cribl/config-volume
    ports:
      - "19000:9000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - cribl_volume:/opt/cribl/config-volume
volumes:
  splunk_etc:
  splunk_var:
  cribl_volume: